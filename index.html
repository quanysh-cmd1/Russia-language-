
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра по русскому языку - Ж. Жабаев атындағы мектеп</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f4f8;
            overflow-x: hidden;
        }
        /* Global scaling for desktop screens to simulate 75% zoom */
        @media (min-width: 1024px) {
            #root {
                zoom: 0.75;
                -moz-transform: scale(0.75);
                -moz-transform-origin: top center;
                width: 133.33%; /* Compensate for zoom to fill width */
                margin-left: auto;
                margin-right: auto;
            }
        }
        /* Ensure touch events work well on interactive boards */
        * {
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .animate-slideIn {
            animation: slideInRight 0.4s ease-out forwards;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            top: -10px;
            z-index: 1000;
            pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
